<section class="welcome-panel">
  <h2>Welcome to Maker Edition</h2>
  <p class="muted">
    This is your <strong>Ideas board</strong>. Each idea fans out into formats
    (sticker, print, magnet…), tracks its materials and costs, and records sales
    across your channels. Let's add your first one.
  </p>
  <form method="post" action="/designs" class="welcome-form">
    <label for="welcome-title">Name your first design</label>
    <input id="welcome-title" name="title" type="text"
           placeholder="e.g. Loon on Blue Lake" required>
    <button type="submit">Create design →</button>
  </form>
  <p class="muted welcome-next">
    Next you'll add its formats and materials on the design page.
  </p>
</section>
