plank: maker
entity: ProductVersion
version: 1
description: A revision of a Product; the unit of "which version sells better"

fields:
  number:
    type: integer
    required: true
  status:
    type: enum
    values: [draft, current, retired]
    default: draft
  notes:
    type: text
  production_files:
    type: file
    multiple: true
    ui:
      label: Production files
      icon: "🛠"
  mockups:
    type: file
    multiple: true
    ui:
      label: Mockups
      icon: "📷"

relations:
  product:
    type: many_to_one
    target: maker.Product
  variations:
    type: one_to_many
    target: maker.Variation
